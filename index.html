<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZOO CLICKER 3D 🐻‍❄️</title>
    <style>
        body { margin: 0; overflow: hidden; background: #FFDE59; font-family: sans-serif; }
        #ui { 
            position: absolute; top: 20px; width: 100%; text-align: center; 
            color: #333; pointer-events: none; 
        }
        #score { font-size: 48px; font-weight: bold; }
        .hint { font-size: 18px; color: #555; }
        #click-btn {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 20px 50px; font-size: 24px; cursor: pointer;
            background: #FF5757; color: white; border: none; border-radius: 50px;
            box-shadow: 0 6px #c0392b;
        }
        #click-btn:active { box-shadow: 0 2px #c0392b; transform: translateX(-50%) translateY(4px); }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">Золото: 0</div>
        <p class="hint">Жми на кнопку, чтобы заработать!</p>
    </div>
    
    <button id="click-btn">КЛИК! 💰</button>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        // 1. СЦЕНА
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 1, 0);

        // 2. ДАННЫЕ
        let gold = 0;
        const animals = ['animal-polar.glb', 'animal-panda.glb', 'animal-fox.glb'];
        let currentIdx = 0;
        let model = null;
        const loader = new GLTFLoader();

        // 3. ФУНКЦИЯ ЗАГРУЗКИ
        function loadModel(name) {
            if (model) scene.remove(model);
            loader.load(name, (gltf) => {
                model = gltf.scene;
                model.position.y = 0;
                scene.add(model);
            }, undefined, (err) => {
                console.log("Богдан, не забудь загрузить файл: " + name);
            });
        }

        loadModel(animals[currentIdx]);

        // 4. КЛИК
        document.getElementById('click-btn').addEventListener('click', () => {
            gold += 1;
            document.getElementById('score').innerText = "Золото: " + gold;
            
            // Анимация прыжка модели
            if (model) {
                model.scale.set(1.2, 1.2, 1.2);
                setTimeout(() => model.scale.set(1, 1, 1), 100);
            }

            // Каждые 50 кликов меняем зверя бесплатно!
            if (gold % 50 === 0) {
                currentIdx = (currentIdx + 1) % animals.length;
                loadModel(animals[currentIdx]);
            }
        });

        // 5. ЦИКЛ
        function animate() {
            requestAnimationFrame(animate);
            if (model) model.rotation.y += 0.02; // Моделька красиво крутится
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
