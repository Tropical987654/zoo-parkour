<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZOO TYCOON YANDEX EDITION 🐾</title>
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; display: flex; animation: rainbowBG 20s linear infinite; }
        @keyframes rainbowBG {
            0% { background-color: #ffadad; } 50% { background-color: #caffbf; } 100% { background-color: #ffadad; }
        }
        .side-panel { width: 330px; background: rgba(255,255,255,0.9); padding: 15px; height: 100vh; overflow-y: auto; box-sizing: border-box; z-index: 20; border: 6px solid #333; }
        #game-area { flex: 1; position: relative; }
        #ui-top { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #gold-display { font-size: 50px; text-shadow: 3px 3px 0px #fff; color: #333; }
        .card { background: #fff; border: 3px solid #ddd; border-radius: 15px; padding: 10px; margin-bottom: 10px; }
        .buy-btn { width: 100%; padding: 10px; cursor: pointer; background: #FF5757; color: white; border: none; border-radius: 8px; box-shadow: 0 4px #c0392b; font-family: inherit; }
        .ad-btn { background: #4CAF50; box-shadow: 0 4px #2e7d32; margin-top: 10px; }
        .floating-click { position: absolute; pointer-events: none; color: #FFD700; font-weight: bold; animation: floatUp 0.6s ease-out forwards; z-index: 100; font-size: 30px; text-shadow: 2px 2px #000; }
        @keyframes floatUp { from { opacity: 1; } to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="left-panel" class="side-panel">
        <div style="background:#333;color:#fff;padding:10px;text-align:center;border-radius:10px;">ПРОКАЧКА ⚡️</div>
        <div id="upgrades-list"></div>
        <button class="buy-btn ad-btn" onclick="showRewardAd(100)">📺 +100 ЗОЛОТА (РЕКЛАМА)</button>
    </div>

    <div id="game-area">
        <div id="ui-top">
            <div id="gold-display">💰 <span id="gold-val">0</span></div>
            <div style="font-size: 14px; background:white; padding:5px 10px; border-radius:10px; display:inline-block; border:2px solid #333;">
                Клик: x<span id="total-click">1</span> | Доход: +<span id="total-income">0</span>/с
            </div>
        </div>
    </div>

    <div id="right-panel" class="side-panel">
        <div style="background:#333;color:#fff;padding:10px;text-align:center;border-radius:10px;">МАГАЗИН (28 ПЕТОВ) 🐾</div>
        <div id="pet-list"></div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        let ysight; // Переменная для SDK
        let game = { gold: 0, adsWatched: 0, upgrades: { u1: { lvl: 1, name: "Сила Клика", cost: 50 }, u2: { lvl: 0, name: "Доход", cost: 150 } }, ownedPets: [] };

        // Инициализация Яндекс SDK
        YaGames.init().then(sdk => {
            ysight = sdk;
            sdk.features.LoadingProgress.report(100);
            console.log("Яндекс SDK готов!");
        });

        const allPetsData = [
            { id: 'caterpillar', file: 'animal-caterpillar.glb', name: 'Гусеница', price: 0, click: 1, income: 1 },
            { id: 'beaver', file: 'animal-beaver.glb', name: 'Бобр', price: 200, click: 2, income: 5 },
            { id: 'bee', file: 'animal-bee.glb', name: 'Пчела', price: 1000, click: 10, income: 0 },
            { id: 'polar', file: 'animal-polar.glb', name: 'Медведь', price: 2500, click: 30, income: 20 },
            { id: 'fox', file: 'animal-fox.glb', name: 'Лиса', price: 1500, click: 10, income: 10 },
            { id: 'tiger', file: 'animal-tiger.glb', name: 'Тигр', price: 10000, click: 100, income: 50 },
            { id: 'elephant', file: 'animal-elephant.glb', name: 'Слон', price: 50000, click: 500, income: 200 },
            { id: 'lion', file: 'animal-lion.glb', name: 'Лев', price: 15000, click: 150, income: 80 }
            // Добавь остальных по списку аналогично!
        ];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 660) / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 660, window.innerHeight);
        document.getElementById('game-area').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 2.5));
        camera.position.set(0, 10, 18);
        camera.lookAt(0, 2, 0);

        const loader = new GLTFLoader();
        const petModels = [];

        function spawnPet(data) {
            loader.load(data.file, (gltf) => {
                const model = gltf.scene;
                const idx = game.ownedPets.length - 1;
                const row = Math.floor(idx / 5);
                const xPos = [0, -4, 4, -8, 8];
                model.position.set(xPos[idx % 5], 1, row * 6);
                model.scale.set(3, 3, 3);
                scene.add(model);
                petModels.push(model);
            });
        }

        // Старт с худшего
        game.ownedPets.push(allPetsData[0]);
        spawnPet(allPetsData[0]);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (e) => {
            if (e.clientX < 330 || e.clientX > window.innerWidth - 330) return;
            mouse.x = ((e.clientX - 330) / (window.innerWidth - 660)) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            if (intersects.length > 0) {
                let pwr = game.upgrades.u1.lvl + game.ownedPets.reduce((s,p)=>s+p.click,0);
                game.gold += pwr;
                updateUI();
                // Анимация прыжка
                let t = intersects[0].object; while(t.parent !== scene) t = t.parent;
                t.scale.set(3.5, 3.5, 3.5); setTimeout(()=>t.scale.set(3,3,3),100);
            }
        });

        // ФУНКЦИИ РЕКЛАМЫ
        window.showRewardAd = (reward) => {
            if (ysight) {
                ysight.adv.showRewardedVideo({
                    callbacks: {
                        onOpen: () => console.log('Реклама открыта'),
                        onRewarded: () => { game.gold += reward; updateUI(); },
                        onClose: () => console.log('Реклама закрыта'),
                        onError: (e) => console.log('Ошибка рекламы', e)
                    }
                });
            } else {
                alert("Реклама не готова (работает только в Яндекс Играх). Начислено + " + reward);
                game.gold += reward; updateUI();
            }
        };

        // Обычная реклама каждые 2 минуты
        setInterval(() => {
            if (ysight) ysight.adv.showFullscreenAdv();
        }, 120000);

        function updateUI() {
            document.getElementById('gold-val').innerText = Math.floor(game.gold);
            document.getElementById('total-click').innerText = game.upgrades.u1.lvl + game.ownedPets.reduce((s,p)=>s+p.click,0);
            document.getElementById('total-income').innerText = game.upgrades.u2.lvl + game.ownedPets.reduce((s,p)=>s+p.income,0);
            
            const upgList = document.getElementById('upgrades-list');
            upgList.innerHTML = '';
            Object.keys(game.upgrades).forEach(k => {
                const u = game.upgrades[k];
                upgList.innerHTML += `<div class="card"><b>${u.name}</b> (Lvl ${u.lvl})<br>
                <button class="buy-btn" onclick="window.buyUpg('${k}')">Улучшить: ${u.cost} 💰</button></div>`;
            });

            const pList = document.getElementById('pet-list');
            pList.innerHTML = '';
            allPetsData.forEach(p => {
                pList.innerHTML += `<div class="card"><b>${p.name}</b><br><small>Клик +${p.click} | Доход +${p.income}</small>
                <button class="buy-btn" onclick="window.buyPet('${p.id}')">Купить: ${p.price} 💰</button></div>`;
            });
        }

        window.buyUpg = (id) => {
            if (game.gold >= game.upgrades[id].cost) {
                game.gold -= game.upgrades[id].cost;
                game.upgrades[id].lvl++;
                game.upgrades[id].cost *= 2;
                updateUI();
            }
        };

        window.buyPet = (id) => {
            const pet = allPetsData.find(p => p.id === id);
            if (game.gold >= pet.price) {
                game.gold -= pet.price;
                game.ownedPets.push(pet);
                spawnPet(pet);
                updateUI();
            }
        };

        setInterval(() => {
            let inc = game.upgrades.u2.lvl + game.ownedPets.reduce((s,p)=>s+p.income,0);
            if (inc > 0) { game.gold += inc; updateUI(); }
        }, 1000);

        updateUI();
        function animate() {
            requestAnimationFrame(animate);
            petModels.forEach(m => m.lookAt(camera.position.x, 0, camera.position.z));
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
