<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZOO TYCOON: SMART SPAWN & PASSIVE INCOME 🌈💰</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; display: flex; animation: rainbowBG 20s linear infinite; }
        
        @keyframes rainbowBG {
            0% { background-color: #ffadad; } 16% { background-color: #ffd6a5; }
            33% { background-color: #fdffb6; } 50% { background-color: #caffbf; }
            66% { background-color: #9bf6ff; } 83% { background-color: #a0c4ff; }
            100% { background-color: #ffadad; }
        }

        .side-panel { width: 330px; background: rgba(255,255,255,0.85); padding: 15px; height: 100vh; overflow-y: auto; box-sizing: border-box; z-index: 20; border: 6px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        #game-area { flex: 1; position: relative; }
        #ui-top { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #gold-display { font-size: 55px; text-shadow: 4px 4px 0px #fff; color: #333; }
        
        .section-title { text-align: center; background: #333; color: #fff; padding: 12px; border-radius: 12px; font-size: 16px; margin-bottom: 15px; position: sticky; top: 0; }
        .card { background: #fff; border: 3px solid #ddd; border-radius: 18px; padding: 12px; margin-bottom: 12px; transition: 0.2s; }
        
        .buy-btn { 
            width: 100%; padding: 12px; font-size: 14px; cursor: pointer; 
            background: #FF5757; color: white; border: none; border-radius: 10px; 
            box-shadow: 0 4px #c0392b; margin-top: 8px; transition: 0.1s; font-family: inherit;
        }
        .buy-btn:hover { background: #e74c3c; transform: scale(1.02); }
        .buy-btn:active { transform: translateY(3px); box-shadow: 0 1px #c0392b; }

        .floating-click { position: absolute; pointer-events: none; color: #FFD700; font-weight: bold; animation: floatUp 0.6s ease-out forwards; z-index: 100; font-size: 32px; text-shadow: 2px 2px #000; }
        @keyframes floatUp { from { opacity: 1; } to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="left-panel" class="side-panel">
        <div class="section-title">УЛУЧШЕНИЯ ⚡️</div>
        <div id="upgrades-list"></div>
    </div>

    <div id="game-area">
        <div id="ui-top">
            <div id="gold-display">💰 <span id="gold-val">0</span></div>
            <div style="font-size: 16px; background: white; padding: 5px 15px; border-radius: 15px; display: inline-block; border: 3px solid #333;">
                Клик: x<span id="total-click">1</span> | Доход: +<span id="total-income">0</span>/сек
            </div>
        </div>
    </div>

    <div id="right-panel" class="side-panel">
        <div class="section-title">МАГАЗИН ЖИВОТНЫХ 🐾</div>
        <div id="pet-list"></div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        let game = {
            gold: 0,
            upgrades: {
                u1: { lvl: 1, name: "Сила Клика", cost: 50 },
                u2: { lvl: 0, name: "Пассивный Доход", cost: 150 },
                u3: { lvl: 0, name: "Крит. Шанс", cost: 1000 },
                u4: { lvl: 0, name: "Скидка Оптом", cost: 5000 }
            },
            ownedPets: []
        };

        const allPetsData = [
            { id: 'caterpillar', file: 'animal-caterpillar.glb', name: 'Гусеница', price: 50, click: 1, income: 1 },
            { id: 'beaver', file: 'animal-beaver.glb', name: 'Бобр', price: 300, click: 2, income: 5 },
            { id: 'bee', file: 'animal-bee.glb', name: 'Пчела', price: 1200, click: 15, income: 2 },
            { id: 'polar', file: 'animal-polar.glb', name: 'Медведь', price: 3500, click: 40, income: 20 },
            { id: 'tiger', file: 'animal-tiger.glb', name: 'Тигр', price: 10000, click: 100, income: 50 },
            { id: 'elephant', file: 'animal-elephant.glb', name: 'Слон', price: 50000, click: 500, income: 250 }
        ];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 660) / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 660, window.innerHeight);
        document.getElementById('game-area').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 2.5));
        camera.position.set(0, 10, 18);
        camera.lookAt(0, 2, 0);

        const loader = new GLTFLoader();
        const petModels = [];

        // УМНАЯ РАССТАНОВКА
        function spawnPet(data) {
            loader.load(data.file, (gltf) => {
                const model = gltf.scene;
                const idx = game.ownedPets.length - 1;
                
                const row = Math.floor(idx / 5);
                const posInRow = idx % 5;
                
                // Схема: [ -2 ] [ -1 ] [ 0 ] [ 1 ] [ 2 ]
                const xPositions = [0, -4, 4, -8, 8]; 
                const x = xPositions[posInRow];
                const z = row * 6;

                model.position.set(x, 1, z);
                model.scale.set(3, 3, 3);
                scene.add(model);
                petModels.push(model);
            });
        }

        // Старт с Гусеницы
        const firstPet = allPetsData[0];
        game.ownedPets.push(firstPet);
        spawnPet(firstPet);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (e) => {
            if (e.clientX < 330 || e.clientX > window.innerWidth - 330) return;

            mouse.x = ((e.clientX - 330) / (window.innerWidth - 660)) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                let clickPower = game.upgrades.u1.lvl + game.ownedPets.reduce((s, p) => s + p.click, 0);
                game.gold += clickPower;

                let target = intersects[0].object;
                while(target.parent && target.parent !== scene) target = target.parent;
                target.scale.set(4, 4, 4);
                setTimeout(() => target.scale.set(3, 3, 3), 100);

                const txt = document.createElement('div');
                txt.className = 'floating-click';
                txt.style.left = e.clientX + 'px';
                txt.style.top = e.clientY + 'px';
                txt.innerText = "+" + clickPower;
                document.body.appendChild(txt);
                setTimeout(() => txt.remove(), 600);
                updateUI();
            }
        });

        // ПАССИВНЫЙ ДОХОД (раз в секунду)
        setInterval(() => {
            let passive = game.upgrades.u2.lvl + game.ownedPets.reduce((s, p) => s + p.income, 0);
            if (passive > 0) {
                game.gold += passive;
                updateUI();
            }
        }, 1000);

        function updateUI() {
            document.getElementById('gold-val').innerText = Math.floor(game.gold);
            document.getElementById('total-click').innerText = game.upgrades.u1.lvl + game.ownedPets.reduce((s, p) => s + p.click, 0);
            document.getElementById('total-income').innerText = game.upgrades.u2.lvl + game.ownedPets.reduce((s, p) => s + p.income, 0);

            const upgList = document.getElementById('upgrades-list');
            upgList.innerHTML = '';
            Object.keys(game.upgrades).forEach(k => {
                const u = game.upgrades[k];
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<b>${u.name}</b> (Lvl ${u.lvl})<br>
                <button class="buy-btn" onclick="window.buyUpg('${k}')">Улучшить: ${u.cost} 💰</button>`;
                upgList.appendChild(div);
            });

            const pList = document.getElementById('pet-list');
            pList.innerHTML = '';
            allPetsData.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<b>${p.name}</b><br><small>Клик +${p.click} | Доход +${p.income}/с</small>
                <button class="buy-btn" onclick="window.buyPet('${p.id}')">Купить: ${p.price} 💰</button>`;
                pList.appendChild(div);
            });
        }

        window.buyUpg = (id) => {
            if (game.gold >= game.upgrades[id].cost) {
                game.gold -= game.upgrades[id].cost;
                game.upgrades[id].lvl++;
                game.upgrades[id].cost = Math.floor(game.upgrades[id].cost * 2.2);
                updateUI();
            }
        };

        window.buyPet = (id) => {
            const pet = allPetsData.find(p => p.id === id);
            if (game.gold >= pet.price) {
                game.gold -= pet.price;
                game.ownedPets.push(pet);
                spawnPet(pet);
                updateUI();
            }
        };

        updateUI();
        function animate() {
            requestAnimationFrame(animate);
            petModels.forEach(m => m.lookAt(camera.position.x, 0, camera.position.z));
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
