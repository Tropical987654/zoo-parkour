<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZOO PARKOUR: REAL FOREST 🌳</title>
    <style>
        body { margin: 0; overflow: hidden; background: #a2d2ff; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>ZOO PARKOUR</h1>
        <p>Крути <b>КОЛЁСИКО</b> — меняй зверя!</p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const loader = new GLTFLoader();

        // --- ГЕРОИ ---
        const animals = ['animal-bear.glb', 'animal-panda.glb', 'animal-fox.glb', 'animal-penguin.glb'];
        let currentIdx = 0;
        let player = null;

        function loadPlayer(idx) {
            if (player) scene.remove(player);
            loader.load(animals[idx], (gltf) => {
                player = gltf.scene;
                player.position.y = 1;
                scene.add(player);
            });
        }
        loadPlayer(currentIdx);

        window.addEventListener('wheel', (e) => {
            currentIdx = e.deltaY > 0 ? (currentIdx + 1) % animals.length : (currentIdx - 1 + animals.length) % animals.length;
            loadPlayer(currentIdx);
        });

        // --- ГЕНЕРАЦИЯ ЛЕСА ---
        // Тут мы используем твои модели из MegaKit
        function spawnWorld() {
            for (let z = 0; z > -200; z -= 10) {
                // 1. Ставим платформу (кочку)
                const geo = new THREE.CylinderGeometry(3, 3, 1, 6);
                const mat = new THREE.MeshStandardMaterial({ color: 0x55aa44 });
                const land = new THREE.Mesh(geo, mat);
                land.position.set(Math.sin(z * 0.3) * 5, 0, z);
                scene.add(land);

                // 2. С шансом 50% ставим дерево из твоего пака рядом!
                if (Math.random() > 0.5) {
                    loader.load('Tree.glb', (gltf) => { // Проверь, чтобы файл назывался именно так!
                        const tree = gltf.scene;
                        tree.position.set(land.position.x + 6, 0, z);
                        tree.scale.set(2, 2, 2);
                        scene.add(tree);
                    });
                }
            }
        }
        spawnWorld();

        function animate() {
            requestAnimationFrame(animate);
            if (player) player.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
