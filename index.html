<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZOO STOCK TYCOON: PRO 💰</title>
    <style>
        body { margin: 0; overflow: hidden; background: #FFDE59; font-family: 'Arial Black', sans-serif; display: flex; }
        #game-area { flex: 1; position: relative; }
        
        /* ПАНЕЛИ */
        .side-panel { width: 320px; background: #fff; padding: 15px; height: 100vh; overflow-y: auto; box-sizing: border-box; z-index: 20; border: 6px solid #333; }
        #left-panel { border-left: none; }
        #right-panel { border-right: none; }
        
        #ui-top { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #gold-display { font-size: 50px; text-shadow: 3px 3px 0px #fff; color: #333; }
        
        .section-title { text-align: center; background: #333; color: #fff; padding: 10px; border-radius: 10px; font-size: 14px; margin-bottom: 10px; }
        .card { background: #f9f9f9; border: 3px solid #eee; border-radius: 15px; padding: 12px; margin-bottom: 10px; transition: 0.2s; }
        .card:hover { border-color: #FF5757; }
        
        .buy-btn { width: 100%; padding: 10px; font-size: 14px; cursor: pointer; background: #FF5757; color: white; border: none; border-radius: 8px; box-shadow: 0 4px #c0392b; margin-top: 5px; }
        .buy-btn:active { transform: translateY(2px); box-shadow: 0 1px #c0392b; }
        .buy-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        .floating-click { position: absolute; pointer-events: none; color: #FFD700; font-weight: bold; animation: floatUp 0.6s ease-out forwards; z-index: 100; font-size: 24px; }
        @keyframes floatUp { from { opacity: 1; } to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="left-panel" class="side-panel">
        <div class="section-title">ПРОКАЧКА ⚡️</div>
        <div id="upgrades-list"></div>
    </div>

    <div id="game-area">
        <div id="ui-top">
            <div id="gold-display">💰 <span id="gold-val">0</span></div>
            <div style="font-size: 14px;">Клик: x<span id="total-click">1</span> | Авто: <span id="total-auto">0</span>/с</div>
        </div>
    </div>

    <div id="right-panel" class="side-panel">
        <div class="section-title">СТОК ПИТОМЦЕВ 🐾</div>
        <div id="stock-list"></div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        let game = {
            gold: 0,
            upgrades: {
                click: { lvl: 1, name: "Сила Тыка", cost: 50 },
                auto: { lvl: 0, name: "Авто-сбор", cost: 150 },
                crit: { lvl: 0, name: "Крит. Шанс", cost: 500 },
                luck: { lvl: 0, name: "Удача Стока", cost: 1000 },
                speed: { lvl: 1, name: "Скорость Авто", cost: 2000 },
                discount: { lvl: 0, name: "Скидки", cost: 5000 }
            },
            ownedPets: []
        };

        const allPets = [
            { id: 'polar', file: 'animal-polar.glb', name: 'Медведь', price: 500, click: 5, auto: 2 },
            { id: 'beaver', file: 'animal-beaver.glb', name: 'Бобр', price: 300, click: 2, auto: 5 },
            { id: 'bee', file: 'animal-bee.glb', name: 'Пчела', price: 1000, click: 15, auto: 0 },
            { id: 'tiger', file: 'animal-tiger.glb', name: 'Тигр', price: 5000, click: 50, auto: 20 },
            { id: 'panda', file: 'animal-panda.glb', name: 'Панда', price: 2000, click: 20, auto: 10 },
            { id: 'elephant', file: 'animal-elephant.glb', name: 'Слон', price: 10000, click: 100, auto: 50 },
            { id: 'lion', file: 'animal-lion.glb', name: 'Лев', price: 7500, click: 80, auto: 30 },
            { id: 'fox', file: 'animal-fox.glb', name: 'Лиса', price: 1500, click: 10, auto: 15 }
        ];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 640) / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 640, window.innerHeight);
        document.getElementById('game-area').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 2));
        camera.position.set(0, 10, 15);
        camera.lookAt(0, 0, 0);

        const loader = new GLTFLoader();
        const petModels = [];

        function spawnPet(petData) {
            loader.load(petData.file, (gltf) => {
                const model = gltf.scene;
                const idx = game.ownedPets.length - 1;
                const row = Math.floor(idx / 4);
                const col = idx % 4;
                model.position.set(col * 5 - 7.5, 1, row * 5);
                model.scale.set(2.5, 2.5, 2.5);
                scene.add(model);
                petModels.push(model);
            });
        }

        // 1. СТАРТ С РАНДОМ ПЕТОМ
        const startPet = allPets[Math.floor(Math.random() * allPets.length)];
        game.ownedPets.push(startPet);
        spawnPet(startPet);

        function refreshUI() {
            document.getElementById('gold-val').innerText = Math.floor(game.gold);
            let c = game.upgrades.click.lvl + game.ownedPets.reduce((s, p) => s + p.click, 0);
            let a = game.upgrades.auto.lvl + game.ownedPets.reduce((s, p) => s + p.auto, 0);
            document.getElementById('total-click').innerText = c;
            document.getElementById('total-auto').innerText = a;

            // Рендер Прокачки
            const upgList = document.getElementById('upgrades-list');
            upgList.innerHTML = '';
            Object.keys(game.upgrades).forEach(key => {
                const u = game.upgrades[key];
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<b>${u.name}</b> (Lvl ${u.lvl})<br>
                <button class="buy-btn" onclick="buyUpg('${key}')">Цена: ${u.cost} 💰</button>`;
                upgList.appendChild(div);
            });

            // Рендер Стока (6 питомцев)
            const stockList = document.getElementById('stock-list');
            stockList.innerHTML = '';
            // Генерируем сток если он пустой (в реальной игре тут таймер)
            allPets.slice(0, 6).forEach(pet => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<b>${pet.name}</b><br><small>+${pet.click} Тык | +${pet.auto} Авто</small>
                <button class="buy-btn" onclick="buyPet('${pet.id}')">Купить: ${pet.price} 💰</button>`;
                stockList.appendChild(div);
            });
        }

        window.buyUpg = (id) => {
            if (game.gold >= game.upgrades[id].cost) {
                game.gold -= game.upgrades[id].cost;
                game.upgrades[id].lvl++;
                game.upgrades[id].cost = Math.floor(game.upgrades[id].cost * 2.5);
                refreshUI();
            }
        };

        window.buyPet = (id) => {
            const pet = allPets.find(p => p.id === id);
            if (game.gold >= pet.price) {
                game.gold -= pet.price;
                game.ownedPets.push(pet);
                spawnPet(pet);
                refreshUI();
            }
        };

        window.addEventListener('mousedown', (e) => {
            if (e.clientX < 320 || e.clientX > window.innerWidth - 320) return;
            let val = game.upgrades.click.lvl + game.ownedPets.reduce((s, p) => s + p.click, 0);
            game.gold += val;
            
            const txt = document.createElement('div');
            txt.className = 'floating-click';
            txt.style.left = e.clientX + 'px';
            txt.style.top = e.clientY + 'px';
            txt.innerText = "+" + val;
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 600);
            refreshUI();
        });

        setInterval(() => {
            let a = game.upgrades.auto.lvl + game.ownedPets.reduce((s, p) => s + p.auto, 0);
            if (a > 0) { game.gold += a / 10; refreshUI(); }
        }, 100);

        refreshUI();
        function animate() {
            requestAnimationFrame(animate);
            petModels.forEach(m => m.lookAt(camera.position.x, 0, camera.position.z));
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
