<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZOO STOCK TYCOON 💰</title>
    <style>
        body { margin: 0; overflow: hidden; background: #FFDE59; font-family: 'Arial Black', sans-serif; display: flex; }
        #game-area { flex: 1; position: relative; }
        #ui-top { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #gold-display { font-size: 60px; text-shadow: 3px 3px 0px #fff; color: #333; }
        
        /* Компактное меню */
        #side-menu { 
            width: 350px; background: #fff; border-left: 6px solid #333; 
            padding: 15px; overflow-y: auto; height: 100vh; box-sizing: border-box;
        }
        .section-title { text-align: center; background: #333; color: #fff; padding: 10px; border-radius: 10px; font-size: 16px; margin: 10px 0; }
        .upgrade-card, .stock-item { background: #f9f9f9; border: 3px solid #eee; border-radius: 15px; padding: 10px; margin-bottom: 10px; font-size: 14px; }
        .buy-btn { width: 100%; padding: 8px; font-size: 14px; cursor: pointer; background: #FF5757; color: white; border: none; border-radius: 8px; box-shadow: 0 4px #c0392b; }
        .buy-btn:active { transform: translateY(2px); box-shadow: 0 1px #c0392b; }
        
        .stock-timer { text-align: center; color: #FF5757; font-size: 12px; margin-bottom: 5px; }
        .floating-click { position: absolute; pointer-events: none; color: #FFD700; font-weight: bold; animation: floatUp 0.6s ease-out forwards; z-index: 100; }
        @keyframes floatUp { from { transform: scale(1); opacity: 1; } to { transform: translateY(-80px) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

    <div id="game-area">
        <div id="ui-top">
            <div id="gold-display">💰 <span id="gold-val">0</span></div>
            <div style="font-size: 16px;">Клик: x<span id="total-click">1</span> | Авто: <span id="total-auto">0</span>/с</div>
        </div>
    </div>

    <div id="side-menu">
        <div class="section-title">ПРОКАЧКА ⚡️</div>
        <div class="upgrade-card">
            <b>Множитель Тыка</b> (Lvl <span id="lvl-upg">1</span>)
            <button class="buy-btn" onclick="buyGlobalUpgrade()">Улучшить: <span id="cost-upg">100</span> 💰</button>
        </div>

        <div class="section-title">СТОК ПИТОМЦЕВ (1ч) 🐾</div>
        <div class="stock-timer">Обновление через: <span id="timer">59:59</span></div>
        <div id="stock-list">
            </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        let game = {
            gold: 0,
            globalClick: 1,
            globalAuto: 0,
            upgradeLvl: 1,
            nextUpdate: Date.now() + 3600000,
            ownedPets: [],
            currentStock: []
        };

        // База данных всех твоих зверей с характеристиками
        const allPetsData = [
            { id: 'polar', file: 'animal-polar.glb', name: 'Медведь', price: 500, click: 2, auto: 1 },
            { id: 'beaver', file: 'animal-beaver.glb', name: 'Бобр', price: 300, click: 1, auto: 2 },
            { id: 'bee', file: 'animal-bee.glb', name: 'Пчела', price: 800, click: 4, auto: 0 },
            { id: 'tiger', file: 'animal-tiger.glb', name: 'Тигр', price: 2500, click: 10, auto: 5 },
            { id: 'panda', file: 'animal-panda.glb', name: 'Панда', price: 1200, click: 5, auto: 3 },
            { id: 'elephant', file: 'animal-elephant.glb', name: 'Слон', price: 5000, click: 20, auto: 15 }
        ];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 350) / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 350, window.innerHeight);
        document.getElementById('game-area').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 2));
        camera.position.set(0, 8, 14);
        camera.lookAt(0, 0, 0);

        const loader = new GLTFLoader();
        const petModels = [];

        // Функция спавна в свободное место
        function spawnPetModel(petData, index) {
            loader.load(petData.file, (gltf) => {
                const model = gltf.scene;
                // Расстановка по сетке, чтобы не было наслоения
                const x = (index % 5) * 4 - 8;
                const z = Math.floor(index / 5) * 4;
                model.position.set(x, 0.5, z);
                model.scale.set(0,0,0); // Для эффекта появления
                scene.add(model);
                petModels.push(model);

                // Эффект появления (рост)
                let s = 0;
                const grow = setInterval(() => {
                    s += 0.2;
                    model.scale.set(s, s, s);
                    if(s >= 2.5) { model.scale.set(2.5, 2.5, 2.5); clearInterval(grow); }
                }, 20);
            });
        }

        // Логика СТОКА (выбираем 3 случайных пета)
        function refreshStock() {
            game.currentStock = [];
            const shuffled = [...allPetsData].sort(() => 0.5 - Math.random());
            game.currentStock = shuffled.slice(0, 3);
            
            const listEl = document.getElementById('stock-list');
            listEl.innerHTML = '';
            game.currentStock.forEach(pet => {
                const div = document.createElement('div');
                div.className = 'stock-item';
                div.innerHTML = `
                    <b>${pet.name}</b><br>
                    <small>Click: +${pet.click} | Auto: +${pet.auto}</small>
                    <button class="buy-btn" onclick="buyFromStock('${pet.id}')">Купить: ${pet.price} 💰</button>
                `;
                listEl.appendChild(div);
            });
        }

        window.buyFromStock = (petId) => {
            const pet = allPetsData.find(p => p.id === petId);
            if (game.gold >= pet.price) {
                game.gold -= pet.price;
                game.ownedPets.push(pet);
                spawnPetModel(pet, game.ownedPets.length - 1);
                updateUI();
            }
        };

        window.buyGlobalUpgrade = () => {
            let cost = game.upgradeLvl * 100;
            if (game.gold >= cost) {
                game.gold -= cost;
                game.upgradeLvl++;
                updateUI();
            }
        };

        // Эффект клика
        window.addEventListener('mousedown', (e) => {
            if (e.clientX > window.innerWidth - 350) return;
            
            let clickVal = game.globalClick + game.ownedPets.reduce((sum, p) => sum + p.click, 0);
            game.gold += clickVal;
            
            const txt = document.createElement('div');
            txt.className = 'floating-click';
            txt.style.left = e.clientX + 'px';
            txt.style.top = e.clientY + 'px';
            txt.innerText = "+" + clickVal;
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 600);
            
            updateUI();
        });

        function updateUI() {
            document.getElementById('gold-val').innerText = Math.floor(game.gold);
            let totalC = game.globalClick + game.ownedPets.reduce((sum, p) => sum + p.click, 0);
            let totalA = game.globalAuto + game.ownedPets.reduce((sum, p) => sum + p.auto, 0);
            document.getElementById('total-click').innerText = totalC;
            document.getElementById('total-auto').innerText = totalA;
            document.getElementById('lvl-upg').innerText = game.upgradeLvl;
            document.getElementById('cost-upg').innerText = game.upgradeLvl * 100;
        }

        // Автодоход
        setInterval(() => {
            let totalA = game.globalAuto + game.ownedPets.reduce((sum, p) => sum + p.auto, 0);
            if (totalA > 0) {
                game.gold += totalA / 10;
                updateUI();
            }
        }, 100);

        refreshStock();
        updateUI();

        function animate() {
            requestAnimationFrame(animate);
            // Все смотрят на тебя
            petModels.forEach(m => m.lookAt(camera.position.x, 0, camera.position.z));
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
