<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZOO TYCOON GIGA PRO 💰</title>
    <style>
        body { margin: 0; overflow: hidden; background: #FFDE59; font-family: 'Arial Black', sans-serif; display: flex; }
        
        /* ПАНЕЛИ */
        .side-panel { width: 320px; background: #fff; padding: 15px; height: 100vh; overflow-y: auto; box-sizing: border-box; z-index: 20; border: 6px solid #333; }
        #left-panel { border-right: 6px solid #333; }
        #right-panel { border-left: 6px solid #333; }
        
        #game-area { flex: 1; position: relative; }
        #ui-top { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; z-index: 10; }
        #gold-display { font-size: 50px; text-shadow: 4px 4px 0px #fff; color: #333; }
        
        .section-title { text-align: center; background: #333; color: #fff; padding: 12px; border-radius: 12px; font-size: 16px; margin-bottom: 15px; position: sticky; top: 0; }
        .card { background: #f1f1f1; border: 3px solid #ddd; border-radius: 18px; padding: 12px; margin-bottom: 12px; }
        
        .buy-btn { width: 100%; padding: 10px; font-size: 14px; cursor: pointer; background: #FF5757; color: white; border: none; border-radius: 10px; box-shadow: 0 4px #c0392b; margin-top: 8px; }
        .buy-btn:active { transform: translateY(2px); box-shadow: 0 1px #c0392b; }

        .floating-click { position: absolute; pointer-events: none; color: #FFD700; font-weight: bold; animation: floatUp 0.6s ease-out forwards; z-index: 100; font-size: 30px; text-shadow: 2px 2px #000; }
        @keyframes floatUp { from { opacity: 1; } to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="left-panel" class="side-panel">
        <div class="section-title">ПРОКАЧКА (30+ LVL) ⚡️</div>
        <div id="upgrades-list"></div>
    </div>

    <div id="game-area">
        <div id="ui-top">
            <div id="gold-display">💰 <span id="gold-val">0</span></div>
            <div style="font-size: 14px;">Клик: x<span id="total-click">1</span> | Авто: <span id="total-auto">0</span>/с</div>
        </div>
    </div>

    <div id="right-panel" class="side-panel">
        <div class="section-title">МАГАЗИН ЗВЕРЕЙ 🐾</div>
        <div id="pet-list"></div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        let game = {
            gold: 0,
            upgrades: {
                u1: { lvl: 1, name: "Острые когти", cost: 50 },
                u2: { lvl: 0, name: "Кормушка", cost: 150 },
                u3: { lvl: 0, name: "Крит. Укус", cost: 500 },
                u4: { lvl: 0, name: "Золотая пыль", cost: 1000 },
                u5: { lvl: 0, name: "Энергетик", cost: 2500 },
                u6: { lvl: 0, name: "Мастер Зоо", cost: 5000 }
            },
            ownedPets: []
        };

        // Твой полный список из 28 животных
        const allPetsData = [
            { id: 'polar', file: 'animal-polar.glb', name: 'Белый Медведь', price: 100, click: 2, auto: 1 },
            { id: 'beaver', file: 'animal-beaver.glb', name: 'Бобр', price: 200, click: 1, auto: 3 },
            { id: 'bee', file: 'animal-bee.glb', name: 'Пчела', price: 500, click: 10, auto: 0 },
            { id: 'tiger', file: 'animal-tiger.glb', name: 'Тигр', price: 2500, click: 30, auto: 10 },
            { id: 'panda', file: 'animal-panda.glb', name: 'Панда', price: 1500, click: 10, auto: 5 },
            { id: 'elephant', file: 'animal-elephant.glb', name: 'Слон', price: 10000, click: 50, auto: 50 },
            { id: 'cat', file: 'animal-cat.glb', name: 'Кот', price: 300, click: 4, auto: 2 },
            { id: 'dog', file: 'animal-dog.glb', name: 'Пес', price: 300, click: 3, auto: 4 },
            { id: 'caterpillar', file: 'animal-caterpillar.glb', name: 'Гусеница', price: 50, click: 1, auto: 1 },
            { id: 'penguin', file: 'animal-penguin.glb', name: 'Пингвин', price: 800, click: 5, auto: 5 },
            { id: 'lion', file: 'animal-lion.glb', name: 'Лев', price: 7000, click: 60, auto: 25 },
            { id: 'fox', file: 'animal-fox.glb', name: 'Лиса', price: 1200, click: 8, auto: 6 },
            { id: 'bunny', file: 'animal-bunny.glb', name: 'Зайчик', price: 150, click: 2, auto: 1 },
            { id: 'cow', file: 'animal-cow.glb', name: 'Корова', price: 2000, click: 5, auto: 20 }
        ];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth - 640) / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 640, window.innerHeight);
        document.getElementById('game-area').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 2));
        camera.position.set(0, 10, 15);
        camera.lookAt(0, 0, 0);

        const loader = new GLTFLoader();
        const petModels = [];

        function spawnPet(data) {
            loader.load(data.file, (gltf) => {
                const model = gltf.scene;
                const idx = game.ownedPets.length - 1;
                model.position.set((idx % 5) * 4 - 8, 1, Math.floor(idx / 5) * 4);
                model.scale.set(2.5, 2.5, 2.5);
                scene.add(model);
                petModels.push(model);
            });
        }

        // Старт с 1 рандомным
        const start = allPetsData[Math.floor(Math.random() * allPetsData.length)];
        game.ownedPets.push(start);
        spawnPet(start);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (e) => {
            // Клик работает только в центральной зоне
            if (e.clientX < 320 || e.clientX > window.innerWidth - 320) return;

            // ИСПРАВЛЕННАЯ МАТЕМАТИКА КЛИКА
            mouse.x = ((e.clientX - 320) / (window.innerWidth - 640)) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                let val = game.upgrades.u1.lvl + game.ownedPets.reduce((s, p) => s + p.click, 0);
                game.gold += val;

                // Эффект прыжка
                let target = intersects[0].object;
                while(target.parent && target.parent !== scene) target = target.parent;
                target.scale.set(3.5, 3.5, 3.5);
                setTimeout(() => target.scale.set(2.5, 2.5, 2.5), 100);

                const txt = document.createElement('div');
                txt.className = 'floating-click';
                txt.style.left = e.clientX + 'px';
                txt.style.top = e.clientY + 'px';
                txt.innerText = "+" + val;
                document.body.appendChild(txt);
                setTimeout(() => txt.remove(), 600);
                updateUI();
            }
        });

        function updateUI() {
            document.getElementById('gold-val').innerText = Math.floor(game.gold);
            document.getElementById('total-click').innerText = game.upgrades.u1.lvl + game.ownedPets.reduce((s, p) => s + p.click, 0);
            document.getElementById('total-auto').innerText = game.upgrades.u2.lvl + game.ownedPets.reduce((s, p) => s + p.auto, 0);

            const upgList = document.getElementById('upgrades-list');
            upgList.innerHTML = '';
            Object.keys(game.upgrades).forEach(k => {
                const u = game.upgrades[k];
                upgList.innerHTML += `<div class="card"><b>${u.name}</b> (Lvl ${u.lvl})<br>
                <button class="buy-btn" onclick="buyUpg('${k}')">Купить: ${u.cost} 💰</button></div>`;
            });

            const pList = document.getElementById('pet-list');
            pList.innerHTML = '';
            allPetsData.forEach(p => {
                pList.innerHTML += `<div class="card"><b>${p.name}</b><br><small>+${p.click} Тык | +${p.auto} Авто</small>
                <button class="buy-btn" onclick="buyPet('${p.id}')">Купить: ${p.price} 💰</button></div>`;
            });
        }

        window.buyUpg = (id) => {
            if (game.gold >= game.upgrades[id].cost) {
                game.gold -= game.upgrades[id].cost;
                game.upgrades[id].lvl++;
                game.upgrades[id].cost *= 2;
                updateUI();
            }
        };

        window.buyPet = (id) => {
            const pet = allPetsData.find(p => p.id === id);
            if (game.gold >= pet.price) {
                game.gold -= pet.price;
                game.ownedPets.push(pet);
                spawnPet(pet);
                updateUI();
            }
        };

        setInterval(() => {
            let a = game.upgrades.u2.lvl + game.ownedPets.reduce((s, p) => s + p.auto, 0);
            if (a > 0) { game.gold += a / 10; updateUI(); }
        }, 100);

        updateUI();
        function animate() {
            requestAnimationFrame(animate);
            petModels.forEach(m => m.lookAt(camera.position.x, 0, camera.position.z));
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
