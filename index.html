<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ZOO PARKOUR: WASD EDITION 🐻‍❄️</title>
    <style>
        body { margin: 0; overflow: hidden; background: #a2d2ff; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        .controls { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>ZOO PARKOUR</h1>
        <div class="controls">
            🏃 <b>WASD</b> — Бегать по лесу<br>
            🔄 <b>Q / E</b> — Сменить зверя<br>
            🖱️ <b>Колёсико</b> — Тоже работает!
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.3));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const loader = new GLTFLoader();

        // --- ГЕРОИ (Исправлено на animal-polar.glb) ---
        const animals = ['animal-polar.glb', 'animal-panda.glb', 'animal-fox.glb', 'animal-penguin.glb'];
        let currentIdx = 0;
        let player = null;

        function loadPlayer(idx) {
            const oldPos = player ? player.position.clone() : new THREE.Vector3(0, 1, 0);
            if (player) scene.remove(player);
            
            loader.load(animals[idx], (gltf) => {
                player = gltf.scene;
                player.position.copy(oldPos);
                scene.add(player);
            });
        }
        loadPlayer(currentIdx);

        // --- УПРАВЛЕНИЕ КЛАВИАТУРОЙ (Q, E и WASD) ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;

            if (key === 'q') { // Листаем назад
                currentIdx = (currentIdx - 1 + animals.length) % animals.length;
                loadPlayer(currentIdx);
            }
            if (key === 'e') { // Листаем вперед
                currentIdx = (currentIdx + 1) % animals.length;
                loadPlayer(currentIdx);
            }
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        // Колёсико тоже оставляем для удобства
        window.addEventListener('wheel', (e) => {
            currentIdx = e.deltaY > 0 ? (currentIdx + 1) % animals.length : (currentIdx - 1 + animals.length) % animals.length;
            loadPlayer(currentIdx);
        });

        // --- МИР ---
        function spawnWorld() {
            for (let z = 0; z > -300; z -= 12) {
                const geo = new THREE.BoxGeometry(8, 1, 8);
                const mat = new THREE.MeshStandardMaterial({ color: 0x44aa33 });
                const land = new THREE.Mesh(geo, mat);
                land.position.set(Math.sin(z * 0.2) * 6, 0, z);
                scene.add(land);
            }
        }
        spawnWorld();

        // --- АНИМАЦИЯ И ДВИЖЕНИЕ ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (player) {
                const speed = 0.2;
                if (keys.w) player.position.z -= speed;
                if (keys.s) player.position.z += speed;
                if (keys.a) player.position.x -= speed;
                if (keys.d) player.position.x += speed;

                // Камера плавно следует за игроком
                camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 8, player.position.z + 15), 0.1);
                camera.lookAt(player.position);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
