<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZOO TYCOON 3D 💰</title>
    <style>
        body { margin: 0; overflow: hidden; background: #FFDE59; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #333; pointer-events: none; user-select: none; }
        #gold-display { font-size: 50px; text-shadow: 3px 3px 0px #fff; }
        
        /* Окно магазина */
        #shop-toggle {
            position: absolute; bottom: 20px; left: 20px; padding: 15px 30px;
            background: #4CAF50; color: white; border: none; border-radius: 15px;
            font-size: 20px; cursor: pointer; box-shadow: 0 5px #2e7d32;
        }
        #shop-window {
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); width: 350px; background: white;
            border: 5px solid #333; border-radius: 20px; padding: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .shop-item { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 15px; padding: 10px; background: #f0f0f0; border-radius: 10px;
        }
        .buy-btn { padding: 10px 15px; cursor: pointer; background: #FF5757; color: white; border: none; border-radius: 5px; }
        .buy-btn:disabled { background: #ccc; cursor: not-allowed; }
        #close-shop { float: right; cursor: pointer; font-size: 24px; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="gold-display">💰 0</div>
        <div id="stats">Клик: +1 | Авто: 0/сек</div>
        <div id="pet-count">Питомцы: 1 / 10</div>
    </div>

    <button id="shop-toggle" onclick="toggleShop()">🛒 МАГАЗИН И ПРОКАЧКА</button>

    <div id="shop-window">
        <span id="close-shop" onclick="toggleShop()">✖</span>
        <h2>УЛУЧШЕНИЯ</h2>
        
        <div class="shop-item">
            <span>Сила клика (Lvl <span id="lvl-click">1</span>)</span>
            <button class="buy-btn" onclick="upgrade('click')">Улучшить (<span id="cost-click">50</span> 💰)</button>
        </div>

        <div class="shop-item">
            <span>Автокликер (Lvl <span id="lvl-auto">0</span>)</span>
            <button class="buy-btn" onclick="upgrade('auto')">Улучшить (<span id="cost-auto">100</span> 💰)</button>
        </div>

        <div class="shop-item">
            <span>Новый питомец</span>
            <button class="buy-btn" id="buy-pet-btn" onclick="buyPet()">Купить (500 💰)</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { GLTFLoader } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/loaders/GLTFLoader.js';

        // Состояние игры
        let game = {
            gold: 0,
            clickPower: 1,
            autoPower: 0,
            petLevel: 1,
            costs: { click: 50, auto: 100, pet: 500 }
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        camera.position.set(0, 2, 5);

        const loader = new GLTFLoader();
        let currentModel = null;
        const petFiles = ['animal-polar.glb', 'animal-panda.glb', 'animal-fox.glb', 'animal-penguin.glb', 'animal-pig.glb'];

        function loadPet(idx) {
            if (currentModel) scene.remove(currentModel);
            const fileName = petFiles[idx % petFiles.length];
            loader.load(fileName, (gltf) => {
                currentModel = gltf.scene;
                scene.add(currentModel);
            });
        }
        loadPet(0);

        // Клик по модели
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(scene.children, true);
            if (intersects.length > 0) {
                addGold(game.clickPower);
                // Анимация рывка при клике
                if (currentModel) {
                    currentModel.scale.set(1.3, 1.3, 1.3);
                    setTimeout(() => currentModel.scale.set(1, 1, 1), 100);
                }
            }
        });

        function addGold(amount) {
            game.gold += amount;
            updateUI();
        }

        // Автокликер (работает каждую секунду)
        setInterval(() => {
            if (game.autoPower > 0) addGold(game.autoPower);
        }, 1000);

        function updateUI() {
            document.getElementById('gold-display').innerText = "💰 " + Math.floor(game.gold);
            document.getElementById('stats').innerText = `Клик: +${game.clickPower} | Авто: ${game.autoPower}/сек`;
            document.getElementById('pet-count').innerText = `Питомцы: ${game.petLevel} / 10`;
            
            document.getElementById('lvl-click').innerText = game.clickPower;
            document.getElementById('cost-click').innerText = game.costs.click;
            document.getElementById('lvl-auto').innerText = game.autoPower;
            document.getElementById('cost-auto').innerText = game.costs.auto;
            
            document.getElementById('buy-pet-btn').disabled = (game.petLevel >= 10);
        }

        // Функции магазина доступны глобально
        window.toggleShop = () => {
            const s = document.getElementById('shop-window');
            s.style.display = (s.style.display === 'block') ? 'none' : 'block';
        };

        window.upgrade = (type) => {
            if (game.gold >= game.costs[type]) {
                game.gold -= game.costs[type];
                if (type === 'click') {
                    game.clickPower += 1;
                    game.costs.click = Math.floor(game.costs.click * 1.5);
                } else {
                    game.autoPower += 1;
                    game.costs.auto = Math.floor(game.costs.auto * 1.6);
                }
                updateUI();
            }
        };

        window.buyPet = () => {
            if (game.gold >= game.costs.pet && game.petLevel < 10) {
                game.gold -= game.costs.pet;
                game.petLevel++;
                game.costs.pet *= 2;
                loadPet(game.petLevel - 1);
                updateUI();
                alert("Поздравляю! Твой зоопарк растет!");
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            if (currentModel) {
                // Питомец всегда смотрит на камеру (на тебя!)
                currentModel.lookAt(camera.position.x, 0, camera.position.z);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
